name: Auto Sync z eshopu

on:
  schedule:
    - cron: '0 4 * * *'   # 6:00 CET (UTC+2) = 4:00 UTC
  workflow_dispatch:        # možnost spustit ručně z GitHubu

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync objednávky z eshopu do Supabase
        run: |
          node << 'EOF'
          const https = require('https');

          const SUPABASE_URL = 'https://jihbeduncgspzuamvfbt.supabase.co';
          const SUPABASE_KEY = 'sb_publishable_hsx9W9DmppixFce-mSrrEA_cPM9hkKc';
          const ESHOP_API = 'https://www.drozda-naradi.cz/request.php?action=GetOrders&version=v2.0&password=0b32cf860ef67dc19fa0fce62d18c962';

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          async function supabaseRequest(method, path, body) {
            return new Promise((resolve, reject) => {
              const url = new URL(SUPABASE_URL + path);
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method,
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': 'Bearer ' + SUPABASE_KEY,
                  'Content-Type': 'application/json',
                  'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal'
                }
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          async function main() {
            console.log('Stahuji objednávky z eshopu...');
            const text = await fetchUrl(ESHOP_API);
            const json = JSON.parse(text);
            if (!json.success) throw new Error('Eshop API chyba: ' + json.report);

            const orderList = json.params?.orderList || [];
            console.log('Nalezeno objednávek:', orderList.length);

            let imported = 0, updated = 0;
            for (const o of orderList) {
              const num = String(o.number || o.id_order || '');
              if (!num) continue;
              const c = o.customer?.delivery_information || {};
              const b = o.customer?.billing_information || o.customer?.invoice_information || {};
              const items = (o.row_list || []).map(p => ({
                name: p.product_name || '',
                sku: p.product_number || '',
                qty: parseInt(p.count || 1),
                price_with_vat: parseFloat(p.price_per_unit_with_vat || 0),
                price_without_vat: parseFloat(p.price_per_unit || 0),
                total_with_vat: parseFloat(p.price_total_with_vat || 0),
                img: ''
              }));
              const shipVat = parseFloat(o.delivery?.postovne || 0);
              const shipNoVat = parseFloat(o.delivery?.postovne_bez_dph || 0) || (shipVat ? Math.round(shipVat / 1.21 * 100) / 100 : 0);
              const payVat = parseFloat(o.payment?.castka_platba || 0);
              const payNoVat = parseFloat(o.payment?.castka_platba_bez_dph || 0) || (payVat ? Math.round(payVat / 1.21 * 100) / 100 : 0);
              if (o.delivery?.nazev_postovne !== undefined) items.push({ type: 'shipping', name: o.delivery.nazev_postovne || 'Doprava', price_with_vat: shipVat, price_without_vat: shipNoVat, qty: 1 });
              if (o.payment?.nazev_platba !== undefined) items.push({ type: 'payment', name: o.payment.nazev_platba || 'Platba', price_with_vat: payVat, price_without_vat: payNoVat, qty: 1 });
              const city = (c.city || '').replace(/\s*\[.*?\]/g, '').trim();
              const ico = c.ico || b.ico || '';
              const dic = c.dic || b.dic || '';
              const companyName = c.company || b.company || '';
              const companyParts = [companyName, ico ? 'IČO:' + ico : '', dic ? 'DIČ:' + dic : ''].filter(Boolean);
              const row = {
                order_number: num,
                customer_name: c.name || b.name || '',
                customer_email: c.email || b.email || '',
                customer_phone: c.phone || b.phone || '',
                company: companyParts.join('|'),
                delivery_address: [c.street, city, c.zip].filter(Boolean).join(', '),
                shipping_method: o.delivery?.nazev_postovne || '',
                payment_method: o.payment?.nazev_platba || '',
                total_amount: (parseFloat(o.total?.price_with_vat || 0) + shipVat + payVat) || null,
                order_date: o.created?.date ? new Date(o.created.date).toISOString() : new Date().toISOString(),
                items
              };

              // Zkontroluj zda objednávka existuje
              const check = await supabaseRequest('GET', `/rest/v1/orders?order_number=eq.${num}&select=id`, null);
              const existing = JSON.parse(check.body);

              if (existing && existing.length > 0) {
                await supabaseRequest('PATCH', `/rest/v1/orders?order_number=eq.${num}`, row);
                updated++;
              } else {
                await supabaseRequest('POST', `/rest/v1/orders`, { ...row, status: 'new' });
                imported++;
              }
            }
            console.log(`✅ Hotovo: ${imported} nových, ${updated} aktualizováno`);
          }

          main().catch(e => { console.error('❌ Chyba:', e.message); process.exit(1); });
          EOF
